<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, height=device-height, minimum-scale=1, maximum-scale=1, user-scalable=no">
    <title>Welcome</title>
    <link rel="stylesheet" href="../../themes/ExplosionOfLightBlue.css"/>
    <link rel="stylesheet" href="../../libs/hideCGB/hideDef.css"/>
    <link rel="stylesheet" href="./style.css"/>
</head>
<body>
    <script>
        let lang = SystemAPI.getLang();
        let supportLangs = ["es", "en", "pt", "fr", "it"];
        if(!supportLangs.includes(lang)){
            lang = "en";
        }
        window.langjson = {};
        async function initLang(){
            try{
                let res = await fetch("./lang/"+lang+".json");
                if(!res.ok) throw new Error("File not found");
                langjson = await res.json();
            }catch(err){
                console.warn("No load Lang "+lang+"!, Load En Lang...");
                try{
                    let res = await fetch("./lang/en.json");
                    langjson = await res.json();
                }catch(crit){
                    console.error("No load Base lang!", crit);
                    return;
                }
            }
            let elementsQ = document.querySelectorAll("[langId]");
            elementsQ.forEach(element => {
                let arg = element.getAttribute("langId");
                if(langjson[arg]){
                    element.textContent = langjson[arg];
                }else{
                    console.warn("Invalid key "+arg);
                }
            });
        }
        document.addEventListener("DOMContentLoaded", initLang);
        window.traduceKey = function(key){
            if(langjson[key]){
                return langjson[key];
            }else{
                console.warn("Invalid key "+key);
                return "";
            }
        }
    </script>
    <script src="../../libs/spatialNavigation/spatialNavigation.min.js"></script>
    <script src="./index.js"></script>
    <div id="welcomeI1">
        <h1 langId="bienvenido" id="welcomeTitle"></h1>
        <button langId="ajustesbluetooth" id="welcomeBlueBtn" onclick=""></button><br/>
        <button langId="empezar" id="welcomeCommonBtn" onclick="if(SystemAPI.getDeviceIdP1() < 0){ alert(window.langjson.noControl); }else{ this.parentElement.style.display = 'none'; document.getElementById('requestPerms').style.display = 'block'; }"></button>
    </div>
    <div id="requestPerms" class="hideDef">
        <h1 langId="permisos" id="permsTitle"></h1>
        <button langId="pedirpermisos" id="permsReqBtn" onclick="SystemAPI.requestPerms();"></button><br/>
        <p langId="permisosdescripcion" id="permsDesBtn"></p><br/>
        <button langId="siguiente" id="reqPermsCommonBtn" onclick="this.parentElement.style.display = 'none'; document.getElementById('setProfile').style.display = 'block';"></button>
    </div>
    <div id="setProfile" class="hideDef">
        <h2 langId="perfil" id="profileTitle"></h2>
        <div id="avatarContiner">
            <div class="avatar-wrapper" id="avatarClickable" onclick="abrirModalAvatar()">
                <img id="avatarImage" src="./...">
                <div class="avatar-overlay">
                    <span langId="cambiar"></span>
                </div>
            </div>
            <input type="file" id="gamerAvatarInput" accept="image/*" class="hideDef" onchange="cargarImagenLocal(event)"/>
        </div>
    </div>
    <div id="hideApps" class="hideDef"></div>
    <div id="common" class="hideDef"></div>
</body>
</html>
